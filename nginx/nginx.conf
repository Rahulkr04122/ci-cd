events {
    worker_connections 1024;
}

http {
    server {
        listen 80;

        # Serve React frontend
        location / {
            proxy_pass http://frontend:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Proxy API requests to backend
        location /api {
            proxy_pass http://backend:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Proxy health check
        location /health {
            proxy_pass http://backend:5000;
            proxy_set_header Host $host;
        }
    }
}